<section id="galeria">
  <div class="section-label">Jeta Shkollore</div>
  <h2 class="section-title">Galeria</h2>
  <p class="section-sub">Momente nga aktivitetet, laboratorët dhe jeta e gjallë e shkollës sonë.</p>

  <div class="galeria-grid">

    <!-- Elementi i madh (zë dy rreshta) -->
    <div class="gal-item" style="background:#1a3a2e;">
      <div class="gal-geo">
        <svg width="200" height="400" viewBox="0 0 200 400">
          <circle cx="100" cy="200" r="120" stroke="#5dcaa5" stroke-width="1" fill="none" opacity="0.3"/>
          <circle cx="100" cy="200" r="80"  stroke="#5dcaa5" stroke-width="0.5" fill="none" opacity="0.2"/>
          <line x1="0" y1="200" x2="200" y2="200" stroke="#5dcaa5" stroke-width="0.5" opacity="0.2"/>
          <line x1="100" y1="0" x2="100" y2="400" stroke="#5dcaa5" stroke-width="0.5" opacity="0.2"/>
        </svg>
      </div>
      <div class="gal-inner"><span class="gal-label">Laboratori i Shkencave</span></div>
    </div>

    <div class="gal-item" style="background:#0d1b2a;">
      <div class="gal-geo">
        <svg width="160" height="220" viewBox="0 0 160 220">
          <rect x="20" y="20" width="120" height="180" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.3"/>
          <rect x="40" y="40" width="80"  height="140" stroke="#c9a84c" stroke-width="0.5" fill="none" opacity="0.2"/>
        </svg>
      </div>
      <div class="gal-inner"><span class="gal-label">Biblioteka</span></div>
    </div>

    <div class="gal-item" style="background:#2a1a0d;">
      <div class="gal-geo">
        <svg width="160" height="220" viewBox="0 0 160 220">
          <polygon points="80,20 140,200 20,200" stroke="#ef9f27" stroke-width="1" fill="none" opacity="0.3"/>
        </svg>
      </div>
      <div class="gal-inner"><span class="gal-label">Salla e Arteve</span></div>
    </div>

    <div class="gal-item" style="background:#1a1a2e;">
      <div class="gal-geo">
        <svg width="160" height="220" viewBox="0 0 160 220">
          <circle cx="80" cy="110" r="60" stroke="#7f77dd" stroke-width="1" fill="none" opacity="0.3"/>
          <line x1="80" y1="50"  x2="80"  y2="170" stroke="#7f77dd" stroke-width="0.5" opacity="0.2"/>
          <line x1="20" y1="110" x2="140" y2="110" stroke="#7f77dd" stroke-width="0.5" opacity="0.2"/>
        </svg>
      </div>
      <div class="gal-inner"><span class="gal-label">Klasa Informatikës</span></div>
    </div>

    <div class="gal-item" style="background:#1a2a1a;">
      <div class="gal-geo">
        <svg width="160" height="220" viewBox="0 0 160 220">
          <rect x="30" y="30" width="100" height="160" rx="4" stroke="#97c459" stroke-width="1" fill="none" opacity="0.3"/>
        </svg>
      </div>
      <div class="gal-inner"><span class="gal-label">Festivali Kulturor</span></div>
    </div>

    <!-- ── SHTO FOTO TË RE — kopjo bllokun më poshtë ──
    <div class="gal-item" style="background:#NGJYRA;">
      <div class="gal-geo">
        ... SVG dekorativ opsional ...
      </div>
      <div class="gal-inner"><span class="gal-label">Etiketa e Re</span></div>
    </div>
    ── -->

  </div>
</section>
