<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gjimnazi "Sami Frashëri" — Tiranë</title>
  <!--
    ╔══════════════════════════════════════════════════╗
    ║  STRUKTURA E FAQES:                             ║
    ║                                                  ║
    ║  index.html       ← ky fajll (mos ndrysho shumë)║
    ║  style.css        ← të gjitha stilet/ngjyrat    ║
    ║  sections/        ← çdo seksion si fajll i veçantë
    ║    navbar.html    ← menuja e navigimit           ║
    ║    hero.html      ← faqja kryesore              ║
    ║    lajmet.html    ← lajme & ngjarje             ║
    ║    rreth.html     ← rreth shkollës              ║
    ║    drejtimet.html ← drejtimet mësimore          ║
    ║    orari.html     ← orari mësimor (I RI)        ║
    ║    mesuesit.html  ← stafi mësimdhënës           ║
    ║    galeria.html   ← galeria fotografike         ║
    ║    kontakti.html  ← formular kontakti           ║
    ║    footer.html    ← fund-faqja                  ║
    ╚══════════════════════════════════════════════════╝
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Seksionet ngarkohen dinamikisht nga JavaScript -->
  <div id="app"></div>

  <script>
    /**
     * ══════════════════════════════════════════════════
     *  NGARKIMI I SEKSIONEVE
     *  Renditja e seksioneve kontrollohet këtu.
     *  Shto ose hiq seksione duke edituar listën.
     * ══════════════════════════════════════════════════
     */
    const sections = [
      'navbar.html',
      'hero.html',
      'lajmet.html',
      'rreth.html',
      'drejtimet.html',
      'orari.html',      // ← seksioni i ri i orartit
      'mesuesit.html',
      'galeria.html',
      'kontakti.html',
      'footer.html',
    ];

    /**
     * Ngarkon çdo seksion HTML dhe e vendos në faqe
     */
    async function loadSections() {
      const app = document.getElementById('app');
      for (const src of sections) {
        try {
          const res  = await fetch(src);
          const html = await res.text();
          const div  = document.createElement('div');
          div.innerHTML = html;
          app.appendChild(div);
        } catch (e) {
          console.warn('Seksioni nuk u gjet:', src);
        }
      }
      initScripts();
    }

    /**
     * Inicializon të gjitha funksionet JavaScript pas ngarkimit
     */
    function initScripts() {

      // ── Navbar scroll shadow ──
      window.addEventListener('scroll', () => {
        const nav = document.getElementById('navbar');
        if (nav) nav.classList.toggle('scrolled', window.scrollY > 40);
      });

      // ── Animacionet me IntersectionObserver ──
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.lajm-card, .drejtim-card, .mesues-card, .gal-item, .value-item').forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(24px)';
        el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        observer.observe(el);
      });
    }

    // ── Funksionet globale ──

    /** Hap/mbyll menunë mobile */
    function toggleMenu() {
      const menu = document.getElementById('mobileMenu');
      if (menu) menu.classList.toggle('open');
    }

    /** Trajton dërgimin e formularit */
    function handleSubmit(e) {
      e.preventDefault();
      const msg = document.getElementById('form-msg');
      if (msg) {
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 4000);
      }
    }

    /**
     * ── KONTROLLI I TABËVE TË ORARIT ──
     * switchTab('klasa10a') → aktivizon tab-in dhe panelin përkatës
     */
    function switchTab(id) {
      // Hiq 'active' nga të gjithë tab-ët dhe panelet
      document.querySelectorAll('.orari-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.orari-panel').forEach(p => p.classList.remove('active'));

      // Aktivizo tab-in dhe panelin e zgjedhur
      const panel = document.getElementById('tab-' + id);
      if (panel) panel.classList.add('active');

      // Aktivizo butonin e klikuar
      const tabs = document.querySelectorAll('.orari-tab');
      tabs.forEach(t => {
        if (t.getAttribute('onclick') === `switchTab('${id}')`) {
          t.classList.add('active');
        }
      });
    }

    // Ngarko seksionet kur faqja të jetë gati
    loadSections();
  </script>

</body>
</html>
