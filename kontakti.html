<!-- =============================================
   sections/kontakti.html
   Ndrysho adresën, telefonin dhe emailin këtu
   ============================================= -->

<section id="kontakti">
  <div class="section-label">Na Kontaktoni</div>
  <h2 class="section-title">Jemi Këtu<br>për Ju</h2>

  <div class="kontakti-grid">

    <!-- ── INFORMACIONI I KONTAKTIT — ndrysho të dhënat ── -->
    <div class="contact-info">

      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <h4>Adresa</h4>
          <p>Rruga "Kongresi i Dibrës"<br>Peshkopi, Shqipëri</p>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.94-.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
        </div>
        <div>
          <h4>Telefon</h4>
          <p>+355 4 222 3456<br>+355 4 222 3457</p>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div>
          <h4>Email</h4>
          <p>snajdeni@yahoo.com<br>shefkicorja@gmail.com</p>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div>
          <h4>Orari i Sekretarisë</h4>
          <p>E Hënë — E Premte<br>08:00 — 16:00</p>
        </div>
      </div>

    </div>

    <!-- ── FORMULARI I KONTAKTIT ── -->
    <form class="contact-form" onsubmit="handleSubmit(event)">
      <div class="form-row">
        <div class="form-group">
          <label>Emri</label>
          <input type="text" placeholder="Emri juaj">
        </div>
        <div class="form-group">
          <label>Mbiemri</label>
          <input type="text" placeholder="Mbiemri juaj">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="email@shembull.al">
      </div>
      <div class="form-group">
        <label>Tema</label>
        <select>
          <option value="">Zgjidhni temën...</option>
          <option>Informacion mbi regjistrimin</option>
          <option>Pyetje akademike</option>
          <option>Bashkëpunim institucional</option>
          <option>Tjetër</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mesazhi</label>
        <textarea rows="4" placeholder="Shkruani mesazhin tuaj..."></textarea>
      </div>
      <button type="submit" class="btn-gold">Dërgo Mesazhin</button>
      <div id="form-msg" style="font-size:13px;color:#9FE1CB;display:none;margin-top:4px;">
        Mesazhi u dërgua me sukses!
      </div>
    </form>

  </div>
</section>
